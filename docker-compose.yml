# =============================================================================
# Aurelia – Docker Compose
#
# Before running:
#   1. Copy docker.env.example → .env  (in this root directory)
#   2. Fill in DB_SA_PASSWORD and JWT_SECRET in .env
#   3. docker compose up --build
#
# Useful commands:
#   First-time seed:  docker compose exec backend npm run prisma:seed
#   DB diagnostics:   docker compose exec backend npm run db:diag
#   Logs:             docker compose logs -f
#   Tear down:        docker compose down          (keeps volumes)
#                     docker compose down -v       (deletes volumes + all data)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # SQL Server 2022
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD:?DB_SA_PASSWORD is required in root .env}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      # sqlcmd is at /opt/mssql-tools18 in the 2022 image.
      # -C trusts the self-signed cert; -b exits non-zero on error.
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "$$MSSQL_SA_PASSWORD"
        -Q "SELECT 1" -b -C
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Express / Prisma backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5001

      # SQL auth (no integratedSecurity) pointing at the sqlserver service
      DATABASE_URL: "sqlserver://sqlserver:1433;database=LuxuryHotelDB;user=sa;password=${DB_SA_PASSWORD:?DB_SA_PASSWORD is required in root .env};trustServerCertificate=true"

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in root .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}

      # CORS: the frontend is served on port 3000
      FRONTEND_URL: "http://localhost:3000"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}

      # Uploads: files written to /app/uploads inside the container
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-5}
      # PUBLIC_BASE_URL tells the API what absolute URL to use for upload links.
      # localhost:5001 works when the backend port is mapped to the host.
      PUBLIC_BASE_URL: "http://localhost:5001"

      # Optional Cloudinary (leave blank to use local disk uploads)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

      # Seed credentials (used by: docker compose exec backend npm run prisma:seed)
      # SEED_ADMIN_PASSWORD has NO default on purpose — must come from .env.
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@aurelia.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required in root .env}
    ports:
      - "5001:5001"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time.
        # Must be the URL the *browser* uses to reach the backend.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5001/api}
    environment:
      NODE_ENV: production
      NEXT_SERVER_API_PROXY_TARGET: ${NEXT_SERVER_API_PROXY_TARGET:-http://backend:5001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  sqlserver_data:    # SQL Server data files – persist across restarts
  backend_uploads:   # Uploaded images – persist across restarts
