name: Publish Images

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Publish backend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          REPO_LC=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "repo_lc=${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_lc }}-backend:latest
            ghcr.io/${{ steps.vars.outputs.repo_lc }}-backend:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha,scope=backend-publish
          cache-to: type=gha,scope=backend-publish,mode=max

  frontend:
    name: Publish frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          REPO_LC=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "repo_lc=${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_lc }}-frontend:latest
            ghcr.io/${{ steps.vars.outputs.repo_lc }}-frontend:sha-${{ steps.vars.outputs.sha_short }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:5001/api
          cache-from: type=gha,scope=frontend-publish
          cache-to: type=gha,scope=frontend-publish,mode=max
